name: Flutter Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository letöltése
        uses: actions/checkout@v4

      - name: Java 17 beállítása
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Flutter telepítése
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter verzió ellenőrzése
        run: flutter --version

      - name: Android projektfájlok létrehozása
        run: |
          flutter create \
            --platforms=android \
            --project-name=zsolt_pro_ai \
            --org=hu.zsoltproai \
            .

      - name: Android engedélyek hozzáadása
        run: |
          python3 - <<'PY'
          from pathlib import Path

          manifest_path = Path(
              "android/app/src/main/AndroidManifest.xml"
          )

          content = manifest_path.read_text(
              encoding="utf-8"
          )

          permissions = [
              '<uses-permission android:name="android.permission.INTERNET" />',
              '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />',
              '<uses-permission android:name="android.permission.CAMERA" />',
          ]

          manifest_end = content.find(">")

          if manifest_end == -1:
              raise RuntimeError(
                  "Az AndroidManifest.xml hibás formátumú."
              )

          for permission in permissions:
              if permission not in content:
                  content = (
                      content[:manifest_end + 1]
                      + "\n    "
                      + permission
                      + content[manifest_end + 1:]
                  )

          manifest_path.write_text(
              content,
              encoding="utf-8",
          )

          print(
              manifest_path.read_text(
                  encoding="utf-8"
              )
          )
          PY

      - name: ML Kit R8 szabályok létrehozása
        run: |
          cat > android/app/proguard-rules.pro <<'EOF'
          # ===========================================
          # Zsolt Pro AI
          # Google ML Kit OCR - R8 szabályok
          # ===========================================

          # A Zsolt Pro AI jelenleg latin betűs
          # szövegfelismerést használ.
          #
          # A Google ML Kit plugin opcionálisan hivatkozik
          # a kínai, japán, koreai és dévanágari
          # szövegfelismerő modulokra is.
          #
          # Ezek nincsenek telepítve, ezért az R8 számára
          # jelezzük, hogy a hiányuk szándékos.

          -dontwarn com.google.mlkit.vision.text.chinese.**
          -dontwarn com.google.mlkit.vision.text.devanagari.**
          -dontwarn com.google.mlkit.vision.text.japanese.**
          -dontwarn com.google.mlkit.vision.text.korean.**

          # ML Kit és Google Play Services osztályok
          # megőrzése a release buildben.

          -keep class com.google.mlkit.** { *; }
          -keep interface com.google.mlkit.** { *; }

          -keep class com.google.android.gms.internal.mlkit_vision_text_common.** { *; }
          -dontwarn com.google.android.gms.internal.mlkit_vision_text_common.**

          -keepattributes *Annotation*
          -keepattributes Signature
          -keepattributes InnerClasses
          -keepattributes EnclosingMethod
          EOF

          echo "A proguard-rules.pro elkészült:"
          cat android/app/proguard-rules.pro

      - name: ProGuard bekötése az Android release buildbe
        run: |
          python3 - <<'PY'
          from pathlib import Path

          gradle_kts_path = Path(
              "android/app/build.gradle.kts"
          )

          gradle_path = Path(
              "android/app/build.gradle"
          )

          if gradle_kts_path.exists():
              path = gradle_kts_path

              content = path.read_text(
                  encoding="utf-8"
              )

              if '"proguard-rules.pro"' not in content:
                  release_marker = """release {
          """

                  replacement = """release {
                      proguardFiles(
                          getDefaultProguardFile(
                              "proguard-android-optimize.txt"
                          ),
                          "proguard-rules.pro"
                      )
          """

                  if release_marker not in content:
                      raise RuntimeError(
                          "A release buildType nem található "
                          "az android/app/build.gradle.kts fájlban."
                      )

                  content = content.replace(
                      release_marker,
                      replacement,
                      1,
                  )

                  path.write_text(
                      content,
                      encoding="utf-8",
                  )

              print(
                  path.read_text(
                      encoding="utf-8"
                  )
              )

          elif gradle_path.exists():
              path = gradle_path

              content = path.read_text(
                  encoding="utf-8"
              )

              if "proguard-rules.pro" not in content:
                  release_marker = """release {
          """

                  replacement = """release {
                      proguardFiles getDefaultProguardFile(
                          'proguard-android-optimize.txt'
                      ), 'proguard-rules.pro'
          """

                  if release_marker not in content:
                      raise RuntimeError(
                          "A release buildType nem található "
                          "az android/app/build.gradle fájlban."
                      )

                  content = content.replace(
                      release_marker,
                      replacement,
                      1,
                  )

                  path.write_text(
                      content,
                      encoding="utf-8",
                  )

              print(
                  path.read_text(
                      encoding="utf-8"
                  )
              )

          else:
              raise FileNotFoundError(
                  "Nem található Android app Gradle fájl."
              )
          PY

      - name: Automatikus tesztfájl törlése
        run: rm -f test/widget_test.dart

      - name: Csomagok telepítése
        run: flutter pub get

      - name: Dart kód ellenőrzése
        run: flutter analyze

      - name: API kulcsok ellenőrzése
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          SPORTMONKS_API_TOKEN: ${{ secrets.SPORTMONKS_API_TOKEN }}
        run: |
          if [ -z "$THE_ODDS_API_KEY" ]; then
            echo "HIBA: A THE_ODDS_API_KEY GitHub Secret nincs beállítva."
            exit 1
          fi

          if [ -z "$SPORTMONKS_API_TOKEN" ]; then
            echo "HIBA: A SPORTMONKS_API_TOKEN GitHub Secret nincs beállítva."
            exit 1
          fi

          echo "Mindkét kötelező API-kulcs be van állítva."

      - name: Release APK elkészítése
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          SPORTMONKS_API_TOKEN: ${{ secrets.SPORTMONKS_API_TOKEN }}
        run: |
          flutter build apk --release \
            --dart-define=THE_ODDS_API_KEY="$THE_ODDS_API_KEY" \
            --dart-define=SPORTMONKS_API_TOKEN="$SPORTMONKS_API_TOKEN"

      - name: APK feltöltése
        uses: actions/upload-artifact@v4
        with:
          name: Zsolt-Pro-AI-release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

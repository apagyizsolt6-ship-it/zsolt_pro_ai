name: Flutter Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository letöltése
        uses: actions/checkout@v4

      - name: Java 17 beállítása
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Flutter telepítése
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter verzió ellenőrzése
        run: flutter --version

      - name: Android projektfájlok létrehozása
        run: |
          flutter create \
            --platforms=android \
            --project-name=zsolt_pro_ai \
            --org=hu.zsoltproai \
            .

      - name: Csomagok telepítése
        run: flutter pub get

      - name: Dart kód ellenőrzése
        run: flutter analyze

      - name: Release APK elkészítése
        run: flutter build apk --release

      - name: APK feltöltése
        uses: actions/upload-artifact@v4
        with:
          name: Zsolt-Pro-AI-release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

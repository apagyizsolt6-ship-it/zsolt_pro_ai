name: Flutter Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository letöltése
        uses: actions/checkout@v4

      - name: Java 17 beállítása
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Flutter telepítése
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter verzió ellenőrzése
        run: flutter --version

      - name: Android projektfájlok létrehozása
        run: |
          flutter create \
            --platforms=android \
            --project-name=zsolt_pro_ai \
            --org=hu.zsoltproai \
            .

      - name: Internetengedély hozzáadása
        run: |
          python3 - <<'PY'
          from pathlib import Path

          manifest_path = Path(
              "android/app/src/main/AndroidManifest.xml"
          )

          content = manifest_path.read_text(
              encoding="utf-8"
          )

          permission = (
              '<uses-permission '
              'android:name="android.permission.INTERNET" />'
          )

          if permission not in content:
              content = content.replace(
                  "<manifest",
                  "<manifest",
                  1,
              )

              manifest_end = content.find(">")

              content = (
                  content[:manifest_end + 1]
                  + "\n    "
                  + permission
                  + content[manifest_end + 1:]
              )

              manifest_path.write_text(
                  content,
                  encoding="utf-8",
              )

          print(
              manifest_path.read_text(
                  encoding="utf-8"
              )
          )
          PY

      - name: Automatikus tesztfájl törlése
        run: rm -f test/widget_test.dart

      - name: Csomagok telepítése
        run: flutter pub get

      - name: Dart kód ellenőrzése
        run: flutter analyze

      - name: The Odds API kulcs ellenőrzése
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: |
          if [ -z "$THE_ODDS_API_KEY" ]; then
            echo "HIBA: A THE_ODDS_API_KEY GitHub Secret nincs beállítva."
            exit 1
          fi

      - name: Release APK elkészítése
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: |
          flutter build apk --release \
            --dart-define=THE_ODDS_API_KEY="$THE_ODDS_API_KEY"

      - name: APK feltöltése
        uses: actions/upload-artifact@v4
        with:
          name: Zsolt-Pro-AI-release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

name: Flutter Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository letöltése
        uses: actions/checkout@v4

      - name: Java 17 beállítása
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Flutter telepítése
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter verzió ellenőrzése
        run: flutter --version

      - name: Android projektfájlok létrehozása
        run: |
          flutter create \
            --platforms=android \
            --project-name=zsolt_pro_ai \
            --org=hu.zsoltproai \
            .

      - name: Android internetengedélyek hozzáadása
        run: |
          python3 - <<'PY'
          from pathlib import Path

          manifest_path = Path(
              "android/app/src/main/AndroidManifest.xml"
          )

          content = manifest_path.read_text(
              encoding="utf-8"
          )

          permissions = [
              '<uses-permission android:name="android.permission.INTERNET" />',
              '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />',
          ]

          manifest_end = content.find(">")

          for permission in permissions:
              if permission not in content:
                  content = (
                      content[:manifest_end + 1]
                      + "\n    "
                      + permission
                      + content[manifest_end + 1:]
                  )

          manifest_path.write_text(
              content,
              encoding="utf-8",
          )

          print(
              manifest_path.read_text(
                  encoding="utf-8"
              )
          )
          PY

      - name: Automatikus tesztfájl törlése
        run: rm -f test/widget_test.dart

      - name: Csomagok telepítése
        run: flutter pub get

      - name: Dart kód ellenőrzése
        run: flutter analyze

      - name: API kulcsok ellenőrzése
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          SPORTMONKS_API_TOKEN: ${{ secrets.SPORTMONKS_API_TOKEN }}
        run: |
          if [ -z "$THE_ODDS_API_KEY" ]; then
            echo "HIBA: A THE_ODDS_API_KEY GitHub Secret nincs beállítva."
            exit 1
          fi

          if [ -z "$SPORTMONKS_API_TOKEN" ]; then
            echo "HIBA: A SPORTMONKS_API_TOKEN GitHub Secret nincs beállítva."
            exit 1
          fi

          echo "Mindkét API-kulcs be van állítva."

      - name: Release APK elkészítése
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          SPORTMONKS_API_TOKEN: ${{ secrets.SPORTMONKS_API_TOKEN }}
        run: |
          flutter build apk --release \
            --dart-define=THE_ODDS_API_KEY="$THE_ODDS_API_KEY" \
            --dart-define=SPORTMONKS_API_TOKEN="$SPORTMONKS_API_TOKEN"

      - name: APK feltöltése
        uses: actions/upload-artifact@v4
        with:
          name: Zsolt-Pro-AI-release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14
